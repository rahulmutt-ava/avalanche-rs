[package]
name = "ava-vm"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
publish.workspace = true
description = "VM framework base traits: Vm/AppHandler/HealthCheck/Connector/AppSender + error model (port of snow/engine/common + api/health) (M3 / specs 07 §2,§9)."

[dependencies]
ava-types = { path = "../ava-types" }
ava-snow = { path = "../ava-snow" }
ava-database = { path = "../ava-database" }
ava-version = { path = "../ava-version" }
# `safemath` (checked add/sub/mul) for the avax FlowChecker + gas accounting.
ava-utils = { path = "../ava-utils" }

thiserror = { workspace = true }
async-trait = { workspace = true }
serde_json = { workspace = true }
# CancellationToken on every VM/handler method (replaces Go's context.Context).
tokio-util = { workspace = true }
# Arbitrary-precision integer for the gas `calculate_price` fixed-point loop
# (Go uses uint256; intermediate values reach ~MaxUint192). No floats (00 §6.1).
num-bigint = { workspace = true }
# `BoxFuture` for the chain::State async get/unmarshal/build closures.
futures = { workspace = true }

# `testutil` deps (in-memory conformance VM + `vm_conformance!` macro, 07 §10).
tokio = { workspace = true, optional = true }
sha2 = { workspace = true, optional = true }

[features]
# Exposes the in-memory `TestVm` + `vm_conformance!` battery (07 §10) so the
# integration test (and downstream VMs) can run the generic conformance suite.
testutil = ["dep:tokio", "dep:sha2"]

[dev-dependencies]
proptest = { workspace = true }
assert_matches = { workspace = true }
tokio = { workspace = true }
sha2 = { workspace = true }

[lints]
workspace = true
