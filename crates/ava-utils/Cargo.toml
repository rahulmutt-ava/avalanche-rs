[package]
name = "ava-utils"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
publish.workspace = true
description = "Standalone utilities: deterministic RNG/samplers, set/bag/Bits, CB58, clock, safemath (M0 / specs 03 §4, 24)."

# Dependency direction (specs/03 §0): ava-utils was standalone — now includes
# hoisted bloom (M2.17 anticipated; moved here for tx gossip). CB58 + bloom live
# here without pulling ava-crypto to break the ava-types -> ava-crypto cycle;
# both use sha2 directly for hashing. Bloom uses ring for CSPRNG.
[dependencies]
thiserror = { workspace = true }
num-bigint = { workspace = true }
indexmap = { workspace = true }
bs58 = { workspace = true }
sha2 = { workspace = true }
parking_lot = { workspace = true }
# chrono powers formatting conveniences; tokio backs the injectable Clock's
# monotonic reading (M0.12) so tests compose with `start_paused`.
chrono = { workspace = true }
tokio = { version = "1", features = [ "time" ] }
# Bloom filter (M2.17 hoisted from ava-network): ring for CSPRNG.
ring = { workspace = true }

[dev-dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
hex = { workspace = true }
tokio = { version = "1", features = [ "time", "macros", "rt", "test-util" ] }
proptest = { workspace = true }
rstest = { workspace = true }
assert_matches = { workspace = true }
pretty_assertions = { workspace = true }
