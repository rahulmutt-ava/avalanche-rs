[package]
name = "ava-logging"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
publish.workspace = true
description = "Logging level/format model + tracing/OTel wiring (specs/18 §5–§6)."

[dependencies]
thiserror = { workspace = true }
tracing = { workspace = true }
chrono = { workspace = true }
serde_json = { workspace = true }
parking_lot = { workspace = true }
# tracing-subscriber 0.3 provides the layered registry, reload handles, and the
# custom `FormatEvent` hook the §5.4 design depends on (the workspace's 0.2 is a
# transitive pin only).
tracing-subscriber = { version = "0.3.20", features = [ "registry", "fmt", "env-filter", "ansi" ] }
# Non-blocking appender wrapper around our size-aware rolling writer (`rolling`).
tracing-appender = "0.2.3"
# gzip for lumberjack-equivalent compressed backups (specs/18 §5.3).
flate2 = { workspace = true }

[dev-dependencies]
assert_matches = { workspace = true }
# Tempdirs for the rotation + per-chain routing tests.
tempfile = "3"

[lints]
workspace = true
