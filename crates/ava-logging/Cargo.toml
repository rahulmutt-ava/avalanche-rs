[package]
name = "ava-logging"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
publish.workspace = true
description = "Logging level/format model + tracing/OTel wiring (specs/18 §5–§6)."

[dependencies]
thiserror = { workspace = true }
tracing = { workspace = true }
chrono = { workspace = true }
serde_json = { workspace = true }
parking_lot = { workspace = true }
# tracing-subscriber 0.3 provides the layered registry, reload handles, and the
# custom `FormatEvent` hook the §5.4 design depends on (the workspace's 0.2 is a
# transitive pin only).
tracing-subscriber = { version = "0.3.20", features = ["registry", "fmt", "env-filter", "ansi"] }
# Rolling/lumberjack-equivalent file writer.
tracing-appender = "0.2.3"

[dev-dependencies]
assert_matches = { workspace = true }

[lints]
workspace = true
