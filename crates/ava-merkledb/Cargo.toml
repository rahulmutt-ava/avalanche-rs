[package]
name = "ava-merkledb"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
publish.workspace = true
description = "Path-based Merkle radix trie (byte-exact port of Go x/merkledb): Key/Path, node codec, SHA-256 hashing (M1 / specs 04 §3)."

[dependencies]
ava-types = { path = "../ava-types" }
ava-database = { path = "../ava-database" }
thiserror = { workspace = true }
bytes = { workspace = true }
sha2 = { workspace = true }
parking_lot = { workspace = true }
arc-swap = { workspace = true }
# Not yet in the root [workspace.dependencies]; pinned locally (see report).
lru = "0.12"
rayon = "1"

[dev-dependencies]
ava-database = { path = "../ava-database", features = ["testutil"] }
serde = { workspace = true }
serde_json = { workspace = true }
hex = { workspace = true }
assert_matches = { workspace = true }
pretty_assertions = { workspace = true }
proptest = { workspace = true }
