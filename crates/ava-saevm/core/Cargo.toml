[package]
name = "ava-saevm-core"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
publish.workspace = true
description = "The SAE core VM: three frontiers + settlement + lifecycle + sae-rpc (specs/11 §1/§5). M7.1 scaffold."

[dependencies]
ava-saevm-blocks = { path = "../blocks" }
ava-saevm-params = { path = "../params" }
ava-saevm-types = { path = "../types" }
ava-saevm-adaptor = { path = "../adaptor" }
ava-evm-reth = { path = "../../ava-evm-reth" }
ava-vm = { path = "../../ava-vm" }
ava-types = { path = "../../ava-types" }
ava-database = { path = "../../ava-database" }
ava-version = { path = "../../ava-version" }
arc-swap = { workspace = true }
async-trait = { workspace = true }
parking_lot = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
ava-saevm-testutil = { path = "../testutil" }
ava-saevm-proxytime = { path = "../proxytime" }
ava-saevm-gastime = { path = "../gastime" }
hex = { workspace = true }
tokio = { workspace = true, features = [ "macros", "rt", "time", "sync" ] }
