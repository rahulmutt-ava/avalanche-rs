[package]
name = "ava-saevm-exec"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
publish.workspace = true
description = "saexec single-task streaming executor on the ava-evm reuse APIs (specs/11 §6.1): pure execute step + D->M->I->X commit."

[dependencies]
ava-saevm-blocks = { path = "../blocks" }
ava-saevm-db = { path = "../db" }
ava-saevm-gastime = { path = "../gastime" }
ava-saevm-hook = { path = "../hook" }
ava-saevm-proxytime = { path = "../proxytime" }
ava-saevm-types = { path = "../types" }
ava-saevm-worstcase = { path = "../worstcase" }
ava-evm = { path = "../../ava-evm" }
ava-evm-reth = { path = "../../ava-evm-reth" }
ava-vm = { path = "../../ava-vm" }
arc-swap = { workspace = true }
parking_lot = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
ava-database = { path = "../../ava-database" }
ava-saevm-testutil = { path = "../testutil" }
# Tx-signing surface for the determinism property test: build + sign legacy
# value-transfer txs (`TxLegacy` -> `signature_hash` -> secp256k1 recoverable ->
# `into_signed`). Pinned to the versions already in the workspace lock (reached
# transitively via `ava-evm-reth`) so adding them as dev-deps does not churn it.
alloy-consensus = "=2.0.5"
alloy-primitives = "=1.6.0"
secp256k1 = { workspace = true }
hex = { workspace = true }
proptest = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tempfile = "3"
