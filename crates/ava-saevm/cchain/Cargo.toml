[package]
name = "ava-saevm-cchain"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
publish.workspace = true
description = "The minimal EVM C-Chain on sae::Vm: hooks, atomic Import/Export, VM Initialize harness + /avax API (specs/11 §8). M7.1 scaffold."

[dependencies]
ava-saevm-gastime = { path = "../gastime" }
ava-saevm-hook = { path = "../hook" }
ava-saevm-types = { path = "../types" }
# The SAE core VM (the `sae::Vm` analog): the Initialize harness composes it
# with the C-Chain hooks + atomic txpool (specs/11 §5/§8).
ava-saevm-core = { path = "../core" }
# The SAE block lifecycle type the hook builder seam constructs.
ava-saevm-blocks = { path = "../blocks" }
ava-evm-reth = { path = "../../ava-evm-reth" }
ava-types = { path = "../../ava-types" }
ava-vm = { path = "../../ava-vm" }
# The byte-exact linear codec for the atomic Import/Export tx (M7.22, ATOMIC-1).
ava-codec = { path = "../../ava-codec" }
ava-codec-derive = { path = "../../ava-codec-derive" }
# secp256k1fx Input/OutputOwners/Credential/TransferInput/TransferOutput embedded
# as the base fx of the atomic tx components (specs 27 §3.1).
ava-secp256k1fx = { path = "../../ava-secp256k1fx" }
# sha256 of the signed bytes → tx_id (specs 27 §3.1).
ava-crypto = { path = "../../ava-crypto" }
# The cross-chain shared-memory `SharedMemory` view the state applies into a
# single accept batch (specs 27 §2.3 ATOMIC-1).
ava-chains = { path = "../../ava-chains" }
# The atomic-tx state store (tx index + last-height) codec'd over a Database.
ava-database = { path = "../../ava-database" }
# The atomic txpool wakes a `WaitForEvent` waiter via a notify; the gossip loops
# tick on `time` intervals spawned on the `rt`.
tokio = { workspace = true, features = [ "sync", "time", "rt" ] }
# The gossip push/pull loops are spawned under a TaskTracker + cancelled via a
# CancellationToken on shutdown (Go `onClose`; the M7.15 exec pattern).
tokio-util = { workspace = true }
parking_lot = { workspace = true }
thiserror = { workspace = true }
# The `/avax` JSON-RPC service is a direct serde_json handler (the SAE RPC
# convention; no jsonrpsee), matching `core::rpc` (M7.19).
serde_json = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = [ "rt", "rt-multi-thread", "macros", "sync", "time", "test-util" ] }
# The in-memory multi-node gossip network harness (Go `saetest/network.go`).
ava-saevm-testutil = { path = "../testutil" }
