[package]
name = "ava-message"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
publish.workspace = true
description = "p2p wire framing & message codec (byte-exact port of avalanchego/message): generated p2p proto, Op enum, 4-byte BE framing, MsgBuilder + recursive zstd packing, OutboundMsgBuilder (specs 05 / 15 §3.1)."

[dependencies]
ava-types = { path = "../ava-types" }
thiserror = { workspace = true }
bytes = { workspace = true }
prost = { workspace = true }
zstd = { workspace = true }
flate2 = { workspace = true }

[features]
# Exposes `fuzz_support` (the canonical `decode_never_overreads` body shared by
# the cargo-fuzz target and the stable `prop_fuzz_smoke` proptest). Enabled by
# `crates/ava-message/fuzz` and by the `--all-features` verification gate.
fuzzing = [  ]

[build-dependencies]
# Compiles proto/p2p/p2p.proto into OUT_DIR (generated code is NOT committed).
tonic-build = { workspace = true }

[dev-dependencies]
flate2 = { workspace = true }
hex = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
proptest = { workspace = true }
assert_matches = { workspace = true }
pretty_assertions = { workspace = true }
criterion = { workspace = true }

# Mirrors `[workspace.lints]` (root Cargo.toml) but relaxes
# `unused_crate_dependencies` to `allow`: the `message_framing` criterion bench
# (below) needs `criterion` as a dev-dep, yet the lib-test compilation unit never
# references it, so the workspace-level `warn` false-positives under `cargo clippy
# --all-targets`. Cargo forbids mixing `lints.workspace = true` with per-lint
# overrides, so the workspace set is inlined here (keep in sync with the root).
[lints.rust]
unsafe_code = "forbid"
missing_docs = "warn"
unused_crate_dependencies = "allow"

[lints.clippy]
all = { level = "deny", priority = -1 }
unwrap_used = "deny"
expect_used = "warn"
indexing_slicing = "warn"
arithmetic_side_effects = "warn"
todo = "warn"
dbg_macro = "deny"

# Critical-path bench for `cargo xtask bench-guard` (specs/02 §9): P2P wire
# message marshal/unmarshal framing round-trip.
[[bench]]
name = "message_framing"
harness = false
