[package]
name = "avalanchers"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
publish.workspace = true
description = "Avalanche node (Rust) — drop-in replacement for avalanchego."

[lib]
name = "avalanchers"
path = "src/lib.rs"

[[bin]]
name = "avalanchers"
path = "src/main.rs"

[dependencies]
ava-version = { path = "../ava-version" }
clap = { workspace = true }

# Full-node entrypoint (M8.31): resolve the node config, assemble the Node, and
# run dispatch under the single process-wide tokio runtime (17 §1.1).
ava-config = { path = "../ava-config" }
ava-node = { path = "../ava-node" }
anyhow = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

# In-process chain-manager assembly (M3.28): build the VmManager, register the
# built-in no-op test-VM factory, and create one Snowman chain through the full
# create_snowman_chain pipeline. `ava-vm/testutil` supplies the in-memory no-op
# `TestVm` reused as the inner VM (no production no-op VM exists yet).
ava-chains = { path = "../ava-chains" }
ava-engine = { path = "../ava-engine" }
# Production multi-node `Sender` wire-out (M9.15 STEP-q): `boot_chain_over_network`
# builds the real ava-network-backed `OutboundSender` (engine `send_*` →
# `proto/p2p` → `ava_network::network::Network::send`/`gossip`), replacing the
# in-process `RecordingSender` for the networked case.
ava-network = { path = "../ava-network" }
ava-snow = { path = "../ava-snow" }
ava-types = { path = "../ava-types" }
ava-utils = { path = "../ava-utils" }
ava-validators = { path = "../ava-validators" }
ava-proposervm = { path = "../ava-proposervm" }
ava-database = { path = "../ava-database" }
ava-crypto = { path = "../ava-crypto" }
ava-vm = { path = "../ava-vm", features = [ "testutil" ] }

# Real P-Chain boot (M4.30c): materialize `ava_platformvm::PlatformVm` seeded
# from real P-Chain genesis (`ava_genesis`) and drive it in-process through the
# handler→engine-adapter path until it enters `Bootstrapping`.
ava-platformvm = { path = "../ava-platformvm" }
# Real X-Chain boot (M9.15 X/C dispatch): materialize `ava_avm::AvmVm` from a
# synthetic X-Chain genesis and drive it in-process through the same
# `create_snowman_chain` pipeline as the P-Chain, to `NormalOp`.
ava-avm = { path = "../ava-avm" }
# Real C-Chain boot (M9.15 C-Chain dispatch): build a fully-initialized
# `ava_evm::EvmVm` from the production C-Chain genesis JSON
# (`EvmVm::from_genesis`, M6.8 genesis wiring) and drive it in-process through
# the same `create_snowman_chain` pipeline as P/X, to `NormalOp`.
ava-evm = { path = "../ava-evm" }
ava-genesis = { path = "../ava-genesis" }

async-trait = { workspace = true }
thiserror = { workspace = true }
# On-disk scratch dir for the C-Chain Firewood state db (the chain's
# `chain_data_dir`); kept alive for the booted chain's lifetime via the boot
# handle.
tempfile = "3"
# Chain-creator diagnostics (e.g. logging queued chains whose VM dispatch is
# deferred), matching the `ava-node` logging convention.
tracing = { workspace = true }
# The binary owns the single multi-thread runtime (17 §1.1) and installs the
# SIGINT/SIGTERM/SIGABRT handlers (17 §2.5).
tokio = { workspace = true, features = [ "rt", "rt-multi-thread", "sync", "macros", "time", "signal" ] }
tokio-util = { workspace = true }
prometheus = { workspace = true }
# Staking-cert generation + ECDSA P-256 signing for the proposervm identity.
rcgen = { workspace = true }
ring = { workspace = true }
rustls-pemfile = { workspace = true }

# Minimal FFI for the fd-limit (`setrlimit`) + SIGABRT raw signal number; same
# choice as `ava-vm-rpc` (00 §4 keeps the FFI surface to `libc`).
[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
serde_json = { workspace = true }
tokio = { workspace = true, features = [ "rt", "rt-multi-thread", "sync", "macros", "time", "signal" ] }
# Production `OutboundSender` boot test (M9.15 STEP-q): a recording mock
# `Network` + an allow-all `Allower` observe the bootstrapper's frontier
# broadcast carried out through the production sender, decoded back from the
# `proto/p2p` wire bytes (`ava-network` is also a regular dependency above for
# the boot entrypoint's signature).
ava-network = { path = "../ava-network" }
ava-message = { path = "../ava-message" }
# The engine-driven-issuance test (M9.15 STEP (m)) builds a funded synthetic
# P-Chain genesis + a signed CreateSubnetTx spending it, mirroring the
# `ava-reexecute` P-Chain leg; `ava-secp256k1fx` supplies the fx output/input
# types (every other P-Chain crate it needs is already a regular dependency).
ava-secp256k1fx = { path = "../ava-secp256k1fx" }
# SAE in-process dispatch test (M9.15 SAE dispatch): build a real
# `ava_saevm_core::Vm` over the `ava-saevm-testutil` boot seams, wrap it via
# `ava_saevm_adaptor::convert`, and boot it through `boot_generic_chain` to
# `NormalOp`. Test-only — there is NO production SAE dependency (the production
# SAE seams M7.21/M7.26 + genesis materialization are not yet wired).
ava-saevm-core = { path = "../ava-saevm/core" }
ava-saevm-adaptor = { path = "../ava-saevm/adaptor" }
ava-saevm-testutil = { path = "../ava-saevm/testutil" }
