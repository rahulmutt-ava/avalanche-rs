[package]
name = "ava-platformvm"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
publish.workspace = true
description = "P-Chain (PlatformVM): staking/validator-metadata chain — txs, blocks, state, reward/fee math, ValidatorState service (port of vms/platformvm) (M4 / specs 08)."

[dependencies]
ava-types = { path = "../ava-types" }
ava-codec = { path = "../ava-codec" }
ava-codec-derive = { path = "../ava-codec-derive" }
ava-crypto = { path = "../ava-crypto" }
ava-database = { path = "../ava-database" }
ava-validators = { path = "../ava-validators" }
# Generic Warp / ICM primitives (envelope, payload, registry, signer, pure
# bit-set/quorum verification) extracted into a standalone crate (specs 20 §1).
# The P-side `warp` module re-exports these + keeps the L1-lifecycle glue.
ava-warp = { path = "../ava-warp" }
ava-secp256k1fx = { path = "../ava-secp256k1fx" }
# The engine-facing `Block` trait (verify/accept/reject) is owned by `ava-snow`
# and returns `ava_snow::Result`; the M4.25 block wrapper implements it.
ava-snow = { path = "../ava-snow" }
# `ChainContext.network_upgrades` typing + the `Connector::connected` version arg.
ava-version = { path = "../ava-version" }
# avax UTXO components (TransferableInput/Output, BaseTx, sort helpers) shared
# with the AVM (specs 08 §2.4, M4.15); first consumed by M4.3 per-tx structs.
ava-vm = { path = "../ava-vm" }
ava-utils = { path = "../ava-utils" }
num-bigint = { workspace = true }
ruint = { workspace = true }
# Zero-copy cached tx/block bytes (specs 08 §2.3 Tx.bytes, §4.1 Block bytes);
# first consumed by M4.5 Block::parse / a Tx.bytes upgrade.
bytes = { workspace = true }
parking_lot = { workspace = true }
# LRU front caches over each flat-KV prefix space (specs 08 §3.2); same version
# already used by ava-database/ava-blockdb/ava-merkledb in the workspace.
lru = "0.12"
arc-swap = { workspace = true }
tokio = { workspace = true }
# `CancellationToken` on the `Vm`/`ChainVm`/`Block` async trait surfaces (M4.25).
tokio-util = { workspace = true }
# Convert the chain-context `UpgradeConfig` `DateTime<Utc>` activation times to
# the executor `Backend`'s `SystemTime` schedule (M4.25 `vm.rs`).
chrono = { workspace = true }
# `HealthCheck`/`Database` health surfaces return `serde_json::Value` (M4.25).
serde_json = { workspace = true }
# JSON-RPC read-service request/response types (M4.28 `service.rs`/`client.rs`):
# field names + avajson string-encoded ints, bech32 addrs, hex BLS keys.
serde = { workspace = true, features = ["derive"] }
# Hex (`0x…`) encoding of compressed BLS public keys in API replies (M4.28).
hex = { workspace = true }
# The `#[rpc_service("platform")]` registration macro (M8.22) so the bridged
# wire-method set cannot drift from the impl block. NOTE: the full `ava-api`
# crate is NOT usable here — `ava-api → ava-config → ava-genesis →
# ava-platformvm` is a package cycle — so `src/jsonrpc.rs` carries a local,
# parity-tested copy of the gorilla-json2 dispatch core (see its module docs).
ava-api-macros = { path = "../ava-api-macros" }
async-trait = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
# The RocksDB backend powers the M4.13 `conformance::state_roundtrip` temp-dir
# case; enabling the feature here (dev-only) makes `RocksDb` available to the
# integration tests without pulling the C++ FFI into the library build.
ava-database = { path = "../ava-database", features = ["rocksdb"] }
# The M3 Snowman bootstrapper (`Bootstrapper`/`Config`/`Sender`) drives the
# M4.27 `differential::pchain_sync_to_tip` height-0 bootstrap test end-to-end.
# Dev-only: the bootstrap loop is exercised by the test, not the library (no
# cycle — ava-engine does not depend on ava-platformvm).
ava-engine = { path = "../ava-engine" }
serde_json = { workspace = true }
proptest = { workspace = true }
rstest = { workspace = true }
assert_matches = { workspace = true }
pretty_assertions = { workspace = true }

[lints]
workspace = true
