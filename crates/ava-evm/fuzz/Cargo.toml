# cargo-fuzz crate for ava-evm. Detached from the root workspace (own
# `[workspace]` table) so `cargo build --workspace` ignores it; build with
# `cargo +nightly fuzz build` (see plan/M6-cchain.md M6.28).
[package]
name = "ava-evm-fuzz"
version = "0.0.0"
publish = false
edition = "2024"

[package.metadata]
cargo-fuzz = true

[workspace]

[dependencies]
libfuzzer-sys = "0.4"
ava-evm = { path = ".." }
ava-evm-reth = { path = "../../ava-evm-reth" }

[[bin]]
name = "decode_block"
path = "fuzz_targets/decode_block.rs"
test = false
doc = false
bench = false

[[bin]]
name = "decode_atomic_tx"
path = "fuzz_targets/decode_atomic_tx.rs"
test = false
doc = false
bench = false
