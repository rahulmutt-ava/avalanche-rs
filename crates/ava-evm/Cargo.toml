[package]
name = "ava-evm"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
publish.workspace = true
description = "Avalanche C-Chain VM: reth/revm as a library executor behind Avalanche adapters, Firewood-ethhash state-of-record, atomic X<->C txs, per-fork dynamic fees, warp precompiles, eth_*/avax.* RPC (M6 / specs 10)."

# Deps are added per-task as modules land (the workspace denies
# `unused_crate_dependencies`). M6.2 only needs the facade + thiserror for the
# Error sentinel model; M6.3+ add firewood/ava-database/alloy/etc.
[dependencies]
# The G0 facade — the ONLY way ava-evm names reth/revm/alloy (spec 10 §17.1).
ava-evm-reth = { path = "../ava-evm-reth" }
# Code/blockhash side KVs for the EVM state backend (spec 10 §5/§17.2): the
# bytecode (code_hash -> bytecode) and block-hash (number -> hash) stores live in
# ava-database, NOT Firewood (Firewood is account/storage-of-record only).
ava-database = { path = "../ava-database" }
# G7 (spec 10 §7.4/§17.8): the Avalanche network-upgrade activation schedule
# (Mainnet/Fuji Apricot→Granite timestamps) is a set of protocol constants owned
# by ava-version (spec 00 §5) — `AvaChainSpec` re-uses it as the source of truth
# rather than duplicating magic numbers.
ava-version = { path = "../ava-version" }
# ava-version expresses activation times as `chrono::DateTime<Utc>`; the chain
# spec works in u64 unix timestamps, so we convert at construction with chrono.
chrono = { workspace = true }
thiserror = { workspace = true }
# DashMap-equivalent for the verify()->accept() proposal stash keyed by root
# (§17.2.2). A simple `Mutex<HashMap<_,_>>` over parking_lot is enough here.
parking_lot = { workspace = true }
# M6.14 atomic X<->C tx types. The atomic tx codec is the avalanchego linear
# codec (NOT RLP), so ava-evm reuses the same hand-written codec stack as the
# other VMs:
#   - ava-codec(+derive): the `#[derive(AvaCodec)]` linear codec + `Manager`.
#   - ava-types: `Id` (32-byte chain/asset ids) + `ShortId` (20-byte addrs).
#   - ava-vm: the canonical `atomic::Requests`/`Element` shared-memory payloads
#     (`components::avax::shared_memory`) that X<->P already uses — reused, not
#     re-defined, so all three VMs feed one shared-memory `Apply`.
#   - ava-avm: the byte-exact, codec-serializable avax/fx components
#     (`txs::components::{TransferableInput, TransferableOutput, Output}` +
#     `txs::credential::FxCredential`/`Credential`). The atomic codec's secp fx
#     type-ids (TransferInput=5, TransferOutput=7, Credential=9) coincide with the
#     X-Chain codec's, so the X-Chain component encodings are byte-exact here.
ava-codec = { path = "../ava-codec" }
ava-codec-derive = { path = "../ava-codec-derive" }
ava-types = { path = "../ava-types" }
ava-vm = { path = "../ava-vm" }
ava-avm = { path = "../ava-avm" }
# sha256 of the signed bytes -> tx id (coreth `atomic/metadata.go` `Initialize`).
ava-crypto = { path = "../ava-crypto" }
# M6.22 warp precompile + predicate pass (spec 10 §8, spec 20 §7, G4): the
# generic Warp/ICM envelope/payload/verifier primitives live in `ava-warp`
# (extracted from ava-platformvm). The C-Chain warp precompile parses
# `Message`/`AddressedCall` and runs the BLS-aggregate `verify_bit_set_signature`
# against the source subnet's `WarpSet`.
ava-warp = { path = "../ava-warp" }
# The predicate pass resolves the source subnet + height-pinned `WarpSet` from a
# `ValidatorState` (spec 20 §6.1); `ava-validators` owns those types.
ava-validators = { path = "../ava-validators" }
# `Bits` (the warp signer bit-set) is used when computing the per-signer
# predicate gas (NumSigners = popcount of the signer bit-set, spec 20 §7.3).
ava-utils = { path = "../ava-utils" }
# R3-pinned Firewood (spec 04 §4, 00 §11.2): the ethhash (Keccak/Eth-MPT/RLP)
# state-of-record backend. Pinned to the SAME git tag the rest of the workspace
# (ava-merkledb) uses so the graph resolves to one firewood. We depend directly
# (not via ava-merkledb) because M6.3/M6.4 need the raw `Db`/`Revision`/`Proposal`
# + proof API that ava-merkledb's higher-level wrapper does not surface, and we
# need the `ethhash` feature unconditionally (ava-evm is always EVM-state mode).
# NOTE (firewood global compile-time hash switch): `ethhash` flips firewood to
# Keccak GLOBALLY for the build — see report; per-crate `cargo test -p ava-evm`
# is the supported test path; an all-features workspace build is an M6-exit-gate
# cross-cutting concern, not this task's.
firewood = { git = "https://github.com/ava-labs/firewood", tag = "v0.6.0", default-features = false, features = [ "ethhash" ] }
# `firewood::db::DbConfig` needs a `NodeHashAlgorithm` (not re-exported by
# firewood's public API); pull `firewood-storage` from the same rev for
# `NodeHashAlgorithm::compile_option()`. Its `ethhash` feature must track
# `firewood/ethhash` (both flip the global hash mode).
firewood-storage = { git = "https://github.com/ava-labs/firewood", tag = "v0.6.0", default-features = false, features = [ "ethhash" ] }
# Fixed-width big integers for the AP3 base-fee window math (spec 21 §4a): the
# base fee is a 256-bit wei quantity and the delta computation can exceed u64.
# No floats (spec 00 §6.1); all U256 ops are checked/saturating.
ruint = { workspace = true }
# M6.16 atomic mempool: `tokio::sync::Notify` is the wake-on-nonempty signal the
# block builder (M6.20) parks on (coreth `txpool` `pending chan`). Only the
# `sync` feature is needed in the library; the workspace tokio already carries it.
tokio = { workspace = true }
# M6.8 C-Chain genesis parsing (spec 10 §11.1): the embedded coreth genesis JSON
# (`config` chain id + fork timestamps + `feeConfig` + precompile configs +
# `alloc`) is parsed into `AvaChainSpec` + the upgrade schedule. Same schema as
# subnet-evm/coreth `core.Genesis`. `hex` decodes the `0x`-prefixed alloc code /
# byte fields (avalanchego linear-codec-free, plain hex like geth).
serde = { workspace = true }
serde_json = { workspace = true }
hex = { workspace = true }
# M6.10 `EvmVm` ChainVm adapter (spec 10 §3). The adapter implements the
# engine-facing `ava_vm::block::ChainVm` (+ its `Vm` supertrait) and returns
# `ava_snow::Block`s; `ava-snow` supplies `EngineState` + `ChainContext` directly
# (the avm/platformvm precedent imports both crates the same way).
ava-snow = { path = "../ava-snow" }
# M8.22 `create_handlers` bridging (spec 14 §13): the gorilla-json2 service
# registry + `#[rpc_service]` macro + the `registry_service` adapter that wraps
# a registry as an in-process `VmHttpService` (the proposervm precedent;
# ava-api does not depend on ava-evm, so no cycle).
ava-api = { path = "../ava-api" }
async-trait = { workspace = true }
tokio-util = { workspace = true }
# `verified: DashMap<Id, _>` (the processing/verified block tree) + the
# `preferred` / `last_accepted` atomic pointers (spec 10 §3 / §17.2.2). DashMap
# is already in the workspace lock (via reth's graph); arc-swap is a workspace dep.
dashmap = "6"
arc-swap = { workspace = true }

[dev-dependencies]
assert_matches = { workspace = true }
proptest = { workspace = true }
pretty_assertions = { workspace = true }
# The `tests/chainvm.rs` engine harness drives the async `ChainVm`/`Vm` surface.
tokio = { workspace = true, features = [ "macros", "rt", "rt-multi-thread" ] }
tokio-util = { workspace = true }
# Building the secp256k1fx TransferInput/TransferOutput/OutputOwners payloads the
# atomic-tx golden-vector tests embed in the reused X-Chain fx component enums.
ava-secp256k1fx = { path = "../ava-secp256k1fx" }
# Real on-disk scratch dirs for the Firewood roundtrip tests (Firewood is a
# disk-backed DB). Already in the workspace lock via ava-merkledb; pinned locally.
tempfile = "3"
