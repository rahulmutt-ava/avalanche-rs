[package]
name = "ava-network"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
publish.workspace = true
description = "P2P networking: TLS transport + node identity + IP signing (byte-exact port of network/peer) (M2 / specs 05 §1.6, §4)."

# Wave B scope (M2.7–M2.10): TLS + identity layer only. Depends solely on M0
# crates (ava-crypto/ava-types). Intentionally does NOT depend on ava-message
# (built in parallel) — it defines its own error enum (specs/05 §8).
[dependencies]
ava-crypto = { path = "../ava-crypto" }
ava-types = { path = "../ava-types" }

thiserror = { workspace = true }
x509-parser = { workspace = true }
rustls-pemfile = { workspace = true }
arc-swap = { workspace = true }
tokio = { workspace = true }
# TLS1.3-only transport, `ring` provider (no aws-lc-rs cmake/nasm build dep),
# matching the rcgen `ring` backend. Pinned in [workspace.dependencies] (M2-prep).
rustls = { workspace = true }
tokio-rustls = { workspace = true }
ring = { workspace = true }

[dev-dependencies]
# io-util adds tokio::io::duplex + AsyncReadExt/AsyncWriteExt for the loopback
# TLS handshake tests (M2.9/M2.10).
tokio = { workspace = true, features = [ "io-util" ] }
# rcgen builds the P-384/Ed25519 test certs the verifier policy must reject.
rcgen = { workspace = true }
assert_matches = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
hex = { workspace = true }

[lints]
workspace = true
