[package]
name = "ava-network"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
publish.workspace = true
description = "P2P networking: TLS transport + node identity + IP signing (byte-exact port of network/peer) (M2 / specs 05 §1.6, §4)."

# Wave B (M2.7–M2.10): TLS + identity. Wave C (M2.11+): the peer runtime, which
# consumes the wire codec (Creator/InboundMessage) + the version-compat rule, so
# ava-network now depends on ava-message + ava-version (it still keeps its own
# error enum per specs/05 §8).
[dependencies]
ava-crypto = { path = "../ava-crypto" }
ava-types = { path = "../ava-types" }
# Wave C runtime: the codec (Creator/InboundMessage, and OutboundMessage carried
# by the outbound MessageQueue, specs/05 §3.3) + the version-compat rule.
ava-message = { path = "../ava-message" }
ava-version = { path = "../ava-version" }

thiserror = { workspace = true }
async-trait = { workspace = true }
# CancellationToken for the inbound byte throttler acquire-cancel path (M2.13).
tokio-util = { workspace = true }
x509-parser = { workspace = true }
rustls-pemfile = { workspace = true }
arc-swap = { workspace = true }
# Outbound queue byte-pool accounting + the conn-upgrade per-IP cooldown map +
# global token bucket (M2.12/M2.13). DashMap/governor are intentionally avoided —
# the Go reference guards all state under one mutex, so parking_lot::Mutex<HashMap>
# is a faithful, dependency-free port matching Go's bounded-channel semantics.
parking_lot = { workspace = true }
# TLS1.3-only transport, `ring` provider (no aws-lc-rs cmake/nasm build dep),
# matching the rcgen `ring` backend. Pinned in [workspace.dependencies] (M2-prep).
rustls = { workspace = true }
tokio-rustls = { workspace = true }
ring = { workspace = true }
# Wave C peer actor (M2.14+): the read/write tasks need tokio::io (split, duplex,
# AsyncReadExt/AsyncWriteExt) and the runtime/sync/time features for the three
# per-peer tasks. `io-util` adds the duplex stream used by the in-process tests.
tokio = { workspace = true, features = [ "io-util", "macros", "sync", "time", "rt" ] }
# Zero-copy inbound payload buffers (`bytes::Bytes`) on the read path (`specs/17`
# §10); the outbound queue reads `OutboundMessage.bytes: Bytes`.
bytes = { workspace = true }

[dev-dependencies]
# io-util adds tokio::io::duplex + AsyncReadExt/AsyncWriteExt for the loopback
# TLS handshake tests (M2.9/M2.10); macros/time/rt for the throttler tests.
tokio = { workspace = true, features = [ "io-util", "macros", "time", "rt-multi-thread" ] }
tokio-util = { workspace = true }
# rcgen builds the P-384/Ed25519 test certs the verifier policy must reject.
rcgen = { workspace = true }
assert_matches = { workspace = true }
# `bytes::Bytes` is only constructed in tests; the lib reads it through
# `ava_message::codec::OutboundMessage`'s field, so it is a dev-only dep here.
bytes = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
hex = { workspace = true }

[lints]
workspace = true
