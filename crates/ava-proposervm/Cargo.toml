[package]
name = "ava-proposervm"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
publish.workspace = true
description = "ProposerVM block formats (byte-exact) + windower (gonum MT19937/-64) (M3 / specs 06 §7, 07 §7.1-§7.3)."

[lints]
workspace = true

[dependencies]
ava-types = { path = "../ava-types" }
# The proposervm API service (M8.22 / Go `vms/proposervm/service.go`): the
# gorilla-parity JSON-RPC shim (`ServiceRegistry` + `#[rpc_service]`) and the
# `Avalanche-Api-Route` header constant. Mirrors Go's dependency direction —
# `vms/proposervm` imports `api/server` + gorilla (`vm.go:255-311`); no cycle
# (ava-api does not depend on ava-proposervm).
ava-api = { path = "../ava-api" }
ava-codec = { path = "../ava-codec" }
ava-crypto = { path = "../ava-crypto" }
ava-utils = { path = "../ava-utils" }
ava-validators = { path = "../ava-validators" }
ava-vm = { path = "../ava-vm" }
# `Block` trait + `ChainContext` consumed by the VM wrapper (M3.23).
ava-snow = { path = "../ava-snow" }
# `DynDatabase` backing the height index + chain-state persistence (M3.23).
ava-database = { path = "../ava-database" }
# `UpgradeConfig` (fork schedule) drives the regime selection (M3.23).
ava-version = { path = "../ava-version" }

thiserror = { workspace = true }
async-trait = { workspace = true }
sha2 = { workspace = true }
# `CancellationToken` on every VM/block method (replaces Go's context.Context).
tokio-util = { workspace = true }
# `tokio::time::sleep` for the virtual-time slot wait (honors `start_paused`).
tokio = { workspace = true }
# `serde_json::Value` health-check return type (delegated to the inner VM) +
# the JSON-RPC / Connect-JSON wire bodies (M8.22).
serde_json = { workspace = true }
# The JSON-RPC reply types (`GetHeightResponse` / `GetEpochResponse`, Go
# `api.GetHeightResponse` / `service.go:GetEpochResponse`) serialize with
# `json.Uint64` quoted-string parity (M8.22).
serde = { workspace = true }
# The generated `proposervm` Connect message types (`src/pb.rs`; M8.22).
prost = { workspace = true }
# Block timestamps (`i64` unix secs) → `DateTime<Utc>` for the fork gates.
chrono = { workspace = true }

[build-dependencies]
# Generates the prost message types from `proto/proposervm/service.proto`
# (messages only — no tonic client/server stubs; see `build.rs`).
tonic-build = { workspace = true }

[features]
# Exposes the in-memory test inner VM helpers so the integration test (and
# downstream crates) can drive `ProposerVm` over `ava_vm::testutil::TestVm`.
testutil = ["ava-vm/testutil"]

[dev-dependencies]
proptest = { workspace = true }
pretty_assertions = { workspace = true }
assert_matches = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
hex = { workspace = true }
# `test-util` enables `#[tokio::test(start_paused = true)]` virtual time for the
# slot-wait build path (no wall-clock sleeps).
tokio = { workspace = true, features = ["test-util"] }
ava-vm = { path = "../ava-vm", features = ["testutil"] }
# Staking-cert generation + ECDSA P-256 signing for the build-block test.
rcgen = { workspace = true }
ring = { workspace = true }
rustls-pemfile = { workspace = true }
