[package]
name = "ava-reexecute"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Reexecute test harness: replay recorded block ranges → Go-recorded state/merkle roots (specs/02 §10.5/§11.1, M9.19)."
publish = false

[features]
# Gates the *live* P/X reexecute arm once `blockexport`-style P/X fixtures exist
# (M9.19 follow-up). The C-Chain leg runs every CI run with no feature flag; the
# P/X leg is `#[ignore]`d until its recorded fixtures land (mirrors the
# `ava-differential` `interop` feature deferral pattern).
px = [  ]

[dependencies]
# The C-Chain reexecute leg drives the REAL reth `BlockExecutor` + Firewood-ethhash
# state-root pipeline (ported from `crates/ava-evm/tests/cchain_state_root.rs`), so
# the harness links `ava-evm` (chainspec/evmconfig/state) + the reth primitives it
# decodes blocks into + the K/V backend Firewood needs. No VM depends on
# `ava-reexecute` (no dependency cycle).
ava-evm = { path = "../../crates/ava-evm" }
ava-evm-reth = { path = "../../crates/ava-evm-reth" }
ava-database = { path = "../../crates/ava-database" }
serde = { workspace = true }
serde_json = { workspace = true }
hex = { workspace = true }
tempfile = "3"
thiserror = { workspace = true }
# The X-Chain reexecute leg ([`replay_xchain`]) drives the REAL `ava-avm` VM/block
# pipeline (seed genesis state → admit txs → build → verify → accept) from a fixed
# seed and captures the deterministic post-state digest + chain-tip id (the
# X-Chain has no merkle state, so the "root" is sha256 over the sorted final UTXO
# set). It mirrors the `ava-differential` `xchain` collector, so it links the same
# `ava-avm` VM + tx/state/fx types, the engine-facing VM-framework traits, and the
# sha256 helper. None of these depend on `ava-reexecute` (no dependency cycle).
ava-avm = { path = "../../crates/ava-avm" }
# The P-Chain reexecute leg ([`replay_pchain`]) drives the REAL `ava-platformvm`
# VM/block pipeline (seed-derived genesis → build → verify → accept through the
# time-advancing / staker-reward control flow) and reads back the post-state via
# the read-only `with_state` seam. It links the P-Chain VM + genesis/tx/state/fx
# types (sharing the same `ava-vm`/`ava-snow`/`ava-types`/`ava-secp256k1fx` deps
# the X-Chain leg already pulls in). `ava-platformvm` does not depend on
# `ava-reexecute` (no dependency cycle).
ava-platformvm = { path = "../../crates/ava-platformvm" }
ava-vm = { path = "../../crates/ava-vm" }
ava-secp256k1fx = { path = "../../crates/ava-secp256k1fx" }
ava-snow = { path = "../../crates/ava-snow" }
ava-types = { path = "../../crates/ava-types" }
ava-version = { path = "../../crates/ava-version" }
ava-crypto = { path = "../../crates/ava-crypto" }
async-trait = { workspace = true }
tokio = { workspace = true, features = [ "macros", "rt-multi-thread" ] }
tokio-util = { workspace = true }

[lints]
workspace = true
