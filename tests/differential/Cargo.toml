[package]
name = "ava-differential"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Differential test harness: LockstepDriver + Observation vs the Go node (tier X / X.13, specs/02 Â§11)."
publish = false

[features]
# Gates the *live* arm of `differential_interop_handshake` (dials a real Go Fuji
# node at `$AVA_INTEROP_FUJI_ADDR`). Never enabled in CI / per-PR runs â€” only a
# scheduled/nightly job or an explicit `--features interop` turns it on (the test
# is also `#[ignore]`d so it never runs unless the env gate is set). The recorded
# fallback arm runs every CI run with no feature flag.
interop = [  ]
# Gates the *live* two-binary / plugin-interop arms of the M9 mixed-network and
# rpcchainvm tests: `mixed_network_smoke` (boots a live Go+Rust tmpnet) and
# `plugin_rust_in_go` (a Rust test-VM plugin hosted by a live Go node). Both need
# an external Go `avalanchego` binary at `$AVALANCHEGO_PATH` (+ a built
# `avalanchers`), so they are also `#[ignore]`d and never run in CI / this
# sandbox; only a scheduled/nightly job or `--features live -- --ignored` turns
# them on. The pure-Rust offline arms (Observation normalization, config
# determinism, in-process handshake) run every CI run with no feature flag.
live = [  ]

[dependencies]
# The M9.20 crash-injection harness (`crash.rs`) constructs the `ava-database`
# `Error::Other(anyhow::Error)` failpoint error, so it needs `anyhow` directly.
anyhow = { workspace = true }
arbitrary = { workspace = true }
# The `xchain` collector (M5.22) drives the REAL X-Chain VM/block pipeline to
# produce a normalized `Observation`, so the lib links the `ava-avm` VM + its
# tx/state/fx types and the engine-facing VM-framework traits. `ava-avm` does NOT
# depend on `ava-differential` (verified â€” no dependency cycle).
ava-avm = { path = "../../crates/ava-avm" }
ava-vm = { path = "../../crates/ava-vm" }
ava-secp256k1fx = { path = "../../crates/ava-secp256k1fx" }
ava-snow = { path = "../../crates/ava-snow" }
ava-database = { path = "../../crates/ava-database" }
ava-types = { path = "../../crates/ava-types" }
# `ava-utils::clock::MockClock` pins the X-Chain collector's injected clock so
# built-block timestamps (and thus block ids) are deterministic across the
# determinism-gate's two runs (specs 24 hazard #5; M5.f4 moved genesis time to
# the upgrade config, removing the old far-future-genesis pinning).
ava-utils = { path = "../../crates/ava-utils" }
ava-version = { path = "../../crates/ava-version" }
# The `saevm` collector (M7.29) drives the REAL SAE recovery pipeline
# (`ava_saevm_core::recover`) over a `RecoverySource` populated from a LIVE
# Go-oracle vector (block wire bytes + committed ExecutionResults), so the lib
# links the SAE core/blocks/types + the reth block primitives it parses into.
ava-saevm-core = { path = "../../crates/ava-saevm/core" }
ava-saevm-blocks = { path = "../../crates/ava-saevm/blocks" }
ava-saevm-types = { path = "../../crates/ava-saevm/types" }
ava-saevm-proxytime = { path = "../../crates/ava-saevm/proxytime" }
# `mark_synchronous` (M7.36) now takes the `(target, GasPriceConfig)` that goes
# into effect after the synchronous genesis block (Go's `hooks.GasConfigAfter`).
# A synchronous block self-settles, so its gas clock is never read by settlement;
# the differential genesis uses the default config like the in-tree SAE tests.
ava-saevm-gastime = { path = "../../crates/ava-saevm/gastime" }
ava-evm-reth = { path = "../../crates/ava-evm-reth" }
thiserror = { workspace = true }
async-trait = { workspace = true }
hex = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = [ "io-util", "macros", "net", "process", "time", "rt-multi-thread" ] }
tokio-util = { workspace = true }

[dev-dependencies]
# The recorded-fallback arm of `differential_interop_handshake` (M2.22) drives the
# real `ava-network` peer actor + `ava-message` codec offline against a Go-derived
# transcript, so it links the networking stack as dev-deps.
ava-network = { path = "../../crates/ava-network" }
ava-message = { path = "../../crates/ava-message" }
ava-crypto = { path = "../../crates/ava-crypto" }
# The M5.22 `differential::xchain_issue_tx` determinism gate is a proptest dev
# consumer of the `xchain` collector; M7.29 `differential::sae_recovery` reuses
# proptest + pretty_assertions for the recorded Go-oracle recovery replay.
proptest = { workspace = true }
pretty_assertions = { workspace = true }

[lints]
workspace = true
