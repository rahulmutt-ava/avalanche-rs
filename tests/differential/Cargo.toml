[package]
name = "ava-differential"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Differential test harness: LockstepDriver + Observation vs the Go node (tier X / X.13, specs/02 §11)."
publish = false

[features]
# Gates the *live* arm of `differential_interop_handshake` (dials a real Go Fuji
# node at `$AVA_INTEROP_FUJI_ADDR`). Never enabled in CI / per-PR runs — only a
# scheduled/nightly job or an explicit `--features interop` turns it on (the test
# is also `#[ignore]`d so it never runs unless the env gate is set). The recorded
# fallback arm runs every CI run with no feature flag.
interop = []

[dependencies]
arbitrary = { workspace = true }
# The `xchain` collector (M5.22) drives the REAL X-Chain VM/block pipeline to
# produce a normalized `Observation`, so the lib links the `ava-avm` VM + its
# tx/state/fx types and the engine-facing VM-framework traits. `ava-avm` does NOT
# depend on `ava-differential` (verified — no dependency cycle).
ava-avm = { path = "../../crates/ava-avm" }
ava-vm = { path = "../../crates/ava-vm" }
ava-secp256k1fx = { path = "../../crates/ava-secp256k1fx" }
ava-snow = { path = "../../crates/ava-snow" }
ava-database = { path = "../../crates/ava-database" }
ava-types = { path = "../../crates/ava-types" }
ava-version = { path = "../../crates/ava-version" }
async-trait = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = [ "io-util", "macros", "time", "rt-multi-thread" ] }
tokio-util = { workspace = true }

[dev-dependencies]
# The recorded-fallback arm of `differential_interop_handshake` (M2.22) drives the
# real `ava-network` peer actor + `ava-message` codec offline against a Go-derived
# transcript, so it links the networking stack as dev-deps.
ava-network = { path = "../../crates/ava-network" }
ava-message = { path = "../../crates/ava-message" }
ava-crypto = { path = "../../crates/ava-crypto" }
# The M5.22 `differential::xchain_issue_tx` determinism gate is a proptest dev
# consumer of the `xchain` collector.
proptest = { workspace = true }

[lints]
workspace = true
