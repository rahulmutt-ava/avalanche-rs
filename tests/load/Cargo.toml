[package]
name = "ava-load"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Load test harness: sustained tx stream + metric-name SLOs vs a Rust tmpnet (specs/02 §10.3, M9.18)."
publish = false

[features]
# Gates the *live* arm (`sustained_load`) which boots a live Rust tmpnet network
# and issues a sustained tx stream. Needs a built `avalanchers` binary, so it is
# also `#[ignore]`d and never runs in CI / this sandbox; only a scheduled/nightly
# job or `--features live -- --ignored` turns it on. The pure-Rust offline arms
# (generator determinism / rate pacing, Prometheus parse + SLO threshold logic)
# run every CI run with no feature flag.
live = [  ]

[dependencies]
# Per-crate error enums for the metrics parser + live-node driver.
thiserror = { workspace = true }
# The live arm boots a node child process and scrapes `/ext/metrics` over a
# hand-rolled HTTP/1.1 GET on a raw TcpStream (no HTTP-client crate — specs/00
# §4 "no second crate"). `process`/`net`/`time`/`io-util` drive the live path;
# they compile in the default build but only run under the gated arm.
tokio = { workspace = true, features = [ "rt-multi-thread", "macros", "process", "net", "time", "io-util" ] }

[dev-dependencies]
# Readable diffs in the offline determinism / SLO assertions.
pretty_assertions = { workspace = true }
# `#[tokio::test]` for the gated live arm.
tokio = { workspace = true, features = [ "rt-multi-thread", "macros", "process", "net", "time", "io-util" ] }

[lints]
workspace = true
