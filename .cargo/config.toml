# Cargo configuration for the avalanche-rs workspace.

# `cargo xtask <subcommand>` drives the repo automation surface (xtask/), which
# mirrors the Taskfile.yml task names (specs/01 §5, tier X / X.4). The Taskfile
# and CI invoke the xtask-backed tasks through this alias.
[alias]
xtask = "run --quiet --package xtask --"
