# clippy.toml — shared clippy knobs (specs/01-development-environment.md §7.3).
# Workspace-wide lint levels live in the root Cargo.toml [workspace.lints]; this
# file only holds the shared configuration values.
avoid-breaking-exported-api = false
allow-unwrap-in-tests = true
allow-expect-in-tests = true
allow-dbg-in-tests = true
