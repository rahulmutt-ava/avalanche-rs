# https://taskfile.dev
# Run via ./scripts/run_task.sh (prefers `task` on PATH, else the stub fallback).
# Canonical task runner (specs/01-development-environment.md §5.2). CI always
# calls a task here, never `cargo`/`bazel` directly.
version: '3'

vars:
  # Wrap entrypoints in the nix dev shell when available (carried over from Go).
  NIX_RUN: '{{printf "%s/scripts/nix_run.sh" .TASKFILE_DIR}}'
  WORKSPACE: '--workspace'

tasks:
  default: ./scripts/run_task.sh --list

  # --- Build -------------------------------------------------------------
  build:
    desc: Build the avalanchers binary (release)
    cmd: '{{.NIX_RUN}} cargo build -p avalanchers --release'

  build-debug-checks:
    desc: Build with overflow + debug assertions (closest analogue of build-race)
    cmd: '{{.NIX_RUN}} cargo build {{.WORKSPACE}} --profile dev-checks'

  # --- Test --------------------------------------------------------------
  test-unit:
    desc: Run unit tests (all features, CI profile) + doctests
    cmds:
      - '{{.NIX_RUN}} cargo nextest run {{.WORKSPACE}} --all-features --profile ci'
      - '{{.NIX_RUN}} cargo test --doc {{.WORKSPACE}} --all-features'

  test-unit-fast:
    desc: Fast local unit tests (no all-features, no checks profile)
    cmd: '{{.NIX_RUN}} cargo nextest run {{.WORKSPACE}}'

  test-coverage:
    desc: Run tests with coverage (analogue of -coverprofile/-covermode)
    cmd: '{{.NIX_RUN}} cargo llvm-cov nextest {{.WORKSPACE}} --all-features --lcov --output-path lcov.info'

  coverage-floor:
    desc: Run full coverage, then enforce per-crate line-coverage floors (specs/02 §12, X.8) — NIGHTLY ONLY
    # A full instrumented `cargo llvm-cov` build (reth/firewood/saevm) is far too
    # expensive for the per-PR `tests-required` aggregator, so this lives in
    # `.github/workflows/nightly.yml`, not `ci.yml`. `check_coverage_floor.sh`
    # parses the emitted `lcov.info` and fails if any crate in its FLOORS table is
    # below its committed floor ("a PR may not lower a crate below its floor").
    cmds:
      - task: test-coverage
      - '{{.NIX_RUN}} ./scripts/check_coverage_floor.sh lcov.info'

  test-differential:
    desc: Differential harness vs the Go node (recorded-oracle + reexecute)
    cmd: '{{.NIX_RUN}} cargo xtask test-differential --recorded'

  test-reexecute:
    desc: Reexecute golden block ranges, compare state roots
    cmd: '{{.NIX_RUN}} cargo xtask test-reexecute'

  test-live:
    desc: M9 live two-binary arms (mixed-net, plugin interop, upgrade, load) + acceptance gate — NIGHTLY ONLY
    # Builds the Rust `avalanchers` binary, then runs the `#[cfg(feature="live")]`
    # `#[ignore]` live arms in `ava-differential`/`ava-load`/`ava-upgrade`. These
    # boot a real two-binary network and need a Go `avalanchego` at
    # `$AVALANCHEGO_PATH` (rpcchainvm=45) plus the built Rust binary (the tests
    # resolve the default Cargo target path, else `$AVALANCHERS_PATH`). Each live
    # test returns early when `$AVALANCHEGO_PATH` is unset, so this task stays
    # build-safe without a Go node (it then exercises the offline-safe portions +
    # acceptance gate). `--run-ignored all` is the cargo-nextest flag that runs
    # both normal and `#[ignore]` tests. See `.github/workflows/nightly.yml` +
    # specs/02 §11 (tier-X X.15/X.22); per-PR `ci.yml` deliberately skips these.
    cmds:
      # Guard: a stale Go binary (HEAD advanced by `git pull` without a rebuild)
      # silently invalidates every live root. Enforce binary-commit == checkout
      # HEAD before booting any two-binary net. Skipped on the build-safe offline
      # path (no Go binary present), where the live arms early-return anyway.
      - |
        if [ -x "${AVALANCHEGO_SRC:-$HOME/avalanchego}/build/avalanchego" ]; then
          {{.NIX_RUN}} ./scripts/check_oracle_binary.sh
        else
          echo "SKIP oracle-binary check: no Go binary at ${AVALANCHEGO_SRC:-$HOME/avalanchego}/build (build-safe offline run)"
        fi
      - '{{.NIX_RUN}} cargo build -p avalanchers --release'
      - '{{.NIX_RUN}} cargo nextest run -p ava-differential -p ava-load -p ava-upgrade --features live --run-ignored all'
      - '{{.NIX_RUN}} cargo xtask acceptance'
      - '{{.NIX_RUN}} cargo xtask porting-report'

  test-fuzz:
    desc: Run cargo-fuzz targets briefly (smoke)
    # Enter the nightly `fuzz` dev shell (flake `devShells.fuzz`); cargo-fuzz
    # needs nightly for -Zsanitizer/-Zbuild-std. Everything else stays stable.
    env:
      NIX_DEV_SHELL: fuzz
    cmd: '{{.NIX_RUN}} cargo xtask test-fuzz'

  test-fuzz-long:
    desc: Run cargo-fuzz targets for an extended duration (nightly shell)
    env:
      NIX_DEV_SHELL: fuzz
    cmd: '{{.NIX_RUN}} cargo xtask test-fuzz --long'

  # --- Lint / format -----------------------------------------------------
  lint:
    desc: clippy (deny warnings) + rustfmt check + TOML + license headers
    cmds:
      - '{{.NIX_RUN}} cargo clippy {{.WORKSPACE}} --all-targets --all-features -- -D warnings'
      - '{{.NIX_RUN}} cargo fmt --all -- --check'
      - '{{.NIX_RUN}} taplo fmt --check'
      - '{{.NIX_RUN}} ./scripts/check_license_headers.sh'

  lint-fix:
    desc: Auto-fix clippy + format + headers
    cmds:
      - '{{.NIX_RUN}} cargo clippy {{.WORKSPACE}} --all-targets --all-features --fix --allow-dirty --allow-staged'
      - '{{.NIX_RUN}} cargo fmt --all'
      - '{{.NIX_RUN}} taplo fmt'
      - '{{.NIX_RUN}} ./scripts/add_license_headers.sh'

  lint-saevm:
    desc: Stricter pedantic + overflow clippy on SAE crates (analogue of lint-saevm/G115)
    cmd: '{{.NIX_RUN}} ./scripts/lint_saevm.sh'

  lint-determinism:
    desc: Determinism-audit AST pass (wall-clock / HashMap-in-codec / RNG bans)
    cmd: '{{.NIX_RUN}} cargo xtask lint-determinism'

  lint-shell:
    desc: shellcheck (carried over from Go)
    cmd: '{{.NIX_RUN}} ./scripts/shellcheck.sh'

  lint-action:
    desc: actionlint on GitHub workflows (carried over)
    cmd: '{{.NIX_RUN}} actionlint'

  lint-single-runtime:
    desc: Forbid runtime construction / block_on outside the avalanchers binary (specs/17 §1.1)
    cmd: '{{.NIX_RUN}} ./scripts/single_runtime_lint.sh'

  check-yaml-fmt:
    desc: Assert YAML is yamlfmt-clean (carried over)
    cmds:
      - '{{.NIX_RUN}} yamlfmt .'
      - task: check-clean-branch

  lint-all:
    desc: Run all lint checks
    deps: [lint, lint-saevm, lint-determinism, lint-shell, lint-action, lint-single-runtime]
    cmds:
      - task: check-yaml-fmt
      - task: deps-tidy
      - task: check-rust-version
      - task: bazel-check-metadata

  lint-all-ci:
    desc: Run all lint checks sequentially (CI)
    cmds:
      - task: lint
      - task: lint-saevm
      - task: lint-determinism
      - task: lint-shell
      - task: lint-action
      - task: lint-single-runtime
      - task: check-yaml-fmt
      - task: check-rust-version
      - task: deps-tidy
      - task: deps-unused

  # --- Dependencies (go-mod-tidy analogue) -------------------------------
  deps-tidy:
    desc: Verify Cargo.lock is current and dependency policy passes
    cmds:
      - '{{.NIX_RUN}} cargo update --workspace --locked' # fails if Cargo.lock stale
      - '{{.NIX_RUN}} cargo deny check'
      - '{{.NIX_RUN}} bazelisk mod tidy'

  deps-unused:
    desc: Detect unused dependencies
    cmd: '{{.NIX_RUN}} cargo machete'

  deps-audit:
    desc: RustSec advisory scan
    cmd: '{{.NIX_RUN}} cargo audit'

  # --- Codegen -----------------------------------------------------------
  generate-protobuf:
    desc: Regenerate proto bindings (build.rs tonic/prost) and check buf
    cmd: '{{.NIX_RUN}} ./scripts/protobuf_codegen.sh'

  generate-mocks:
    desc: Regenerate committed mocks (mockall) where applicable
    cmd: '{{.NIX_RUN}} ./scripts/generate_mocks.sh'

  check-generate-protobuf:
    desc: Assert proto bindings are current (clean tree)
    cmds:
      - task: generate-protobuf
      - task: check-clean-branch

  check-generate-mocks:
    desc: Assert mocks are current (clean tree)
    cmds:
      - task: generate-mocks
      - task: check-clean-branch

  # --- Bazel -------------------------------------------------------------
  bazel-build:
    desc: Build avalanchers with Bazel
    cmd: '{{.NIX_RUN}} bazelisk build //crates/avalanchers:avalanchers'

  bazel-vs-cargo:
    desc: Build avalanchers with both Cargo and Bazel, asserting both succeed (proves Cargo.lock agreement; specs/01 §4.5)
    cmds:
      - '{{.NIX_RUN}} cargo build -p avalanchers --release'
      - '{{.NIX_RUN}} bazelisk build //crates/avalanchers:avalanchers'

  bazel-build-opt:
    desc: Build avalanchers with Bazel (optimized)
    cmd: '{{.NIX_RUN}} bazelisk build --config=opt //crates/avalanchers:avalanchers'

  bazel-test:
    desc: Run unit tests with Bazel
    cmd: '{{.NIX_RUN}} bazelisk test //...'

  bazel-test-fast:
    desc: Run unit tests with Bazel (no extra checks)
    cmd: '{{.NIX_RUN}} bazelisk test --config=fast //...'

  bazel-gazelle-generate:
    desc: Regenerate BUILD files with gazelle_rust
    cmd: '{{.NIX_RUN}} bazelisk run //:gazelle'

  bazel-fmt:
    desc: Format BUILD.bazel files
    cmd: '{{.NIX_RUN}} buildifier -r .'

  bazel-check-metadata:
    desc: Check BUILD files + Cargo.lock are current (clean tree)
    cmds:
      - task: bazel-gazelle-generate
      - task: bazel-fmt
      - task: check-clean-branch

  # --- Checks ------------------------------------------------------------
  check-rust-version:
    desc: Assert Rust version is consistent across toolchain/Bazel/CI
    cmd: '{{.NIX_RUN}} ./scripts/check_rust_version.sh'

  check-clean-branch:
    desc: Assert the git working tree is clean
    cmd: '{{.NIX_RUN}} ./scripts/check_clean_branch.sh'

  # --- Cross-cutting (tier X) --------------------------------------------
  vectors-verify:
    desc: Validate the golden-vector corpus (schema/hashes/orphans)
    cmd: '{{.NIX_RUN}} cargo xtask vectors verify'

  porting-report:
    desc: Aggregate the per-crate PORTING.md matrices
    cmd: '{{.NIX_RUN}} cargo xtask porting-report'

  saevm-exit-gate:
    desc: M7 (SAE VM / ACP-194) milestone exit gate (named exit tests + PORTING.md + vectors)
    cmd: '{{.NIX_RUN}} cargo xtask saevm-exit-gate'

  install-nix:
    desc: Install nix with an OS-appropriate installer
    cmd: ./scripts/install_nix.sh
