# deny.toml — cargo-deny dependency policy (specs/01-development-environment.md §9).
# Analogue of Go's `go mod tidy` consistency + license + depguard checks:
# single-version-per-crate, license allow-list, banned crates, advisory scanning.
[graph]
all-features = true

[advisories]
db-urls = [ "https://github.com/rustsec/advisory-db" ]
yanked = "deny"
ignore = [
  # rustls-pemfile is unmaintained with NO safe upgrade available; it is now a
  # thin wrapper over rustls-pki-types' PemObject API. Pulled in transitively
  # via the staking-cert path (ava-crypto). Tracked for migration to
  # rustls-pki-types::pem; ignore until then. (specs/01 §9, RUSTSEC-2025-0134)
  "RUSTSEC-2025-0134",
  # lru 0.12.5 IterMut unsoundness. Pre-existing on main at the identical
  # version — NOT introduced by the firewood v0.7.0 bump. We verified no
  # lru::IterMut usage anywhere in crates/*/src (the only iter_mut is a plain
  # slice iterator in ava-database/src/prefixdb.rs). Bumping lru 0.12→0.18 is
  # an API-risky change out of scope for this branch; tracked for a follow-up
  # dep-hygiene pass.
  "RUSTSEC-2026-0002",
  # paste is an unmaintained compile-time proc-macro only (no runtime code).
  # Pre-existing on main at the identical version — NOT introduced by the
  # firewood v0.7.0 bump; tracked for a follow-up dep-hygiene pass.
  "RUSTSEC-2024-0436",
  # proc-macro-error2 is an unmaintained compile-time proc-macro only (no
  # runtime code). Pre-existing on main at the identical version — NOT
  # introduced by the firewood v0.7.0 bump; tracked for a follow-up
  # dep-hygiene pass.
  "RUSTSEC-2026-0173",
]

[licenses]
# Match avalanchego's permissive posture; the repo itself is BSD-3-Clause.
allow = [
  "Apache-2.0",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  "MPL-2.0", # used by some crypto deps; review case-by-case
  "CC0-1.0", # public-domain dedication; used by secp256k1 / secp256k1-sys (core dep)
  "0BSD", # BSD Zero Clause (public-domain-equivalent); varint-rs via value-log/lsm-tree
  "BSL-1.0", # Boost Software License 1.0 (permissive, NOT BUSL); xxhash-rust via lsm-tree
]
confidence-threshold = 0.9
exceptions = [
  # firewood v0.7.0 ships LICENSE.md (Ava Labs Ecosystem license) without an
  # SPDX `license` field in its manifests; same Ava Labs source we already
  # trust as a pinned git dep. Permitted ONLY for the four firewood crates
  # (clarified below) — deliberately NOT in the global allow list.
  { allow = [ "LicenseRef-Firewood-Ecosystem" ], name = "firewood" },
  { allow = [ "LicenseRef-Firewood-Ecosystem" ], name = "firewood-macros" },
  { allow = [ "LicenseRef-Firewood-Ecosystem" ], name = "firewood-metrics" },
  { allow = [ "LicenseRef-Firewood-Ecosystem" ], name = "firewood-storage" },
]

# firewood v0.7.0 dropped the SPDX `license` field from its crate manifests
# (only LICENSE.md ships). Clarify each crate's license from the shared
# repo-root LICENSE.md (hash as reported by cargo-deny's gather step).
[[licenses.clarify]]
name = "firewood"
version = "0.7.0"
expression = "LicenseRef-Firewood-Ecosystem"
license-files = [ { path = "../LICENSE.md", hash = 0xf3f18e53 } ]

[[licenses.clarify]]
name = "firewood-macros"
version = "0.6.0"
expression = "LicenseRef-Firewood-Ecosystem"
license-files = [ { path = "../LICENSE.md", hash = 0xf3f18e53 } ]

[[licenses.clarify]]
name = "firewood-metrics"
version = "0.7.0"
expression = "LicenseRef-Firewood-Ecosystem"
license-files = [ { path = "../LICENSE.md", hash = 0xf3f18e53 } ]

[[licenses.clarify]]
name = "firewood-storage"
version = "0.7.0"
expression = "LicenseRef-Firewood-Ecosystem"
license-files = [ { path = "../LICENSE.md", hash = 0xf3f18e53 } ]

[bans]
multiple-versions = "warn" # tighten to "deny" once the tree stabilizes
wildcards = "deny" # no `*` version requirements (mirrors pinned go.mod)
# Intra-workspace crates are referenced by `path` (no version) — these resolve
# to a `*` requirement that `wildcards = "deny"` would otherwise reject. Allow
# them: they are path-pinned, not crates.io wildcards.
allow-wildcard-paths = true
deny = [
  # Enforce the single-crate-per-job rule from 00 §4 and §7.5:
  { name = "openssl", wrappers = [
    "native-tls",
  ] }, # prefer rustls (00 §4.3)
  # { name = "<banned alt mock crate>" },           # mockall is the only mock lib
]
skip = [  ]
skip-tree = [  ]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = [
  # Pinned git deps (reth/firewood may be git until crates.io releases land).
  "https://github.com/paradigmxyz/reth",
  "https://github.com/ava-labs/firewood",
]
